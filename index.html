<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hypnos · stock</title>
<link rel="icon" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>

/* ── password overlay ─────────────────────────────────────────── */
#pw-overlay {
  position:fixed; inset:0; background:var(--cap); z-index:9999;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:32px;
}
#pw-overlay img { height:36px; opacity:.9; }
#pw-form { display:flex; flex-direction:column; align-items:center; gap:12px; }
#pw-input {
  background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.2);
  color:#fff; padding:10px 20px; border-radius:24px; font-family:inherit;
  font-size:14px; width:240px; outline:none; text-align:center; letter-spacing:.5px;
}
#pw-input::placeholder { color:rgba(255,255,255,.3); }
#pw-input:focus { border-color:rgba(255,255,255,.5); }
#pw-btn {
  background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.25);
  color:#fff; padding:8px 28px; border-radius:24px; font-family:inherit;
  font-size:12px; cursor:pointer; letter-spacing:.4px;
}
#pw-btn:hover { background:rgba(255,255,255,.2); }
#pw-err { font-size:11px; color:#c4796a; min-height:16px; }
* { box-sizing:border-box; margin:0; padding:0; }
:root { --w:#fff; --bl:#EAE6E3; --bd:#B3AAA1; --g:#BDBAB7; --cap:#28211C; }
body { font-family:'DM Sans',Arial,sans-serif; background:var(--bl); color:var(--cap); font-size:13px; }

/* max-width wrapper */
.wrap { max-width:1300px; margin:0 auto; padding:0 32px; }

/* header */
.hdr { background:var(--cap); }
.hdr .wrap { display:flex; align-items:center; gap:16px; padding-top:13px; padding-bottom:13px; }
.logo-img { height:28px; display:block; }
.sub { font-size:10px; color:var(--bd); letter-spacing:.8px; text-transform:uppercase; margin-top:1px; }
.hdr-r { margin-left:auto; display:flex; align-items:center; gap:10px; font-size:11px; color:var(--bd); }
.btn { background:none; border:1px solid var(--bd); color:var(--bd); padding:3px 12px;
       border-radius:20px; font-family:inherit; font-size:11px; cursor:pointer; }
.btn:hover { border-color:#fff; color:#fff; }

/* tabs */
.nav { padding:0; }
.tabs { display:flex; border-bottom:1px solid var(--g); gap:2px; }
.tab { padding:7px 16px; font-size:12px; color:var(--bd); cursor:pointer; border:none;
       border-bottom:2px solid transparent; margin-bottom:-1px; background:none;
       font-family:inherit; white-space:nowrap; }
.tab.on { color:var(--cap); border-bottom-color:var(--cap); font-weight:500; }
.tab:hover:not(.on) { color:var(--cap); }

/* content */
.cnt { padding-bottom:48px; }
.panel { display:none; }
.panel.on { display:block; }

/* toolbar */
.tb { display:flex; align-items:center; gap:8px; margin-bottom:10px; flex-wrap:wrap; }
.si { background:var(--w); border:1px solid var(--g); border-radius:6px;
      padding:5px 12px; font-family:inherit; font-size:12px; width:220px; outline:none; }
.si:focus { border-color:var(--bd); }
.rc { font-size:11px; color:var(--bd); }

/* period */
.pp { display:flex; gap:4px; flex-wrap:wrap; }
.pb { background:var(--w); border:1px solid var(--g); color:var(--bd); padding:3px 10px;
      border-radius:20px; font-size:11px; font-family:inherit; cursor:pointer; }
.pb.on { background:var(--cap); border-color:var(--cap); color:#fff; }
.pb:hover:not(.on) { color:var(--cap); border-color:var(--cap); }

/* table */
.tw { overflow-x:auto; }
table { width:100%; border-collapse:collapse; }
th { text-align:left; font-size:10px; font-weight:500; color:var(--bd); text-transform:uppercase;
     letter-spacing:.4px; padding:6px 12px 6px 0; border-bottom:1px solid var(--g); white-space:nowrap; }
th.r { text-align:right; }
td { padding:5px 12px 5px 0; border-bottom:1px solid rgba(179,170,161,.25); vertical-align:middle; }
td.r { text-align:right; font-variant-numeric:tabular-nums; }
td.sku { font-family:monospace; font-size:11px; color:#6b5f59; font-weight:500; }
td.cat { font-size:11px; color:#7a6f69; min-width:90px; }
tr.dr:hover td { background:rgba(255,255,255,.5); }

/* badges */
.bx { display:inline-block; font-size:10px; font-weight:500; padding:1px 7px; border-radius:10px; line-height:1.6; }
.b-out { background:#fee2e2; color:#b91c1c; }
.b-in  { background:#dcfce7; color:#15803d; }
.b-sin { background:var(--cap); color:#fff; }
.b-ped { background:#ede9fe; color:#6d28d9; }
.b-syn { background:#f1f5f9; color:#64748b; }
.b-adj { background:#fef9c3; color:#854d0e; }

/* diff colors */
.pos { color:#15803d; font-weight:600; }
.neg { color:#b91c1c; font-weight:600; }

/* state */
.st { padding:40px; text-align:center; color:var(--bd); }
.sp { display:inline-block; width:13px; height:13px; border:2px solid var(--g);
      border-top-color:var(--cap); border-radius:50%; animation:spin .7s linear infinite;
      vertical-align:middle; margin-right:6px; }
@keyframes spin { to { transform:rotate(360deg); } }

/* expand */
.xbtn { background:none; border:none; cursor:pointer; font-size:11px; color:var(--bd);
         padding:2px 6px; border-radius:4px; white-space:nowrap; }
.xbtn:hover { background:var(--bl); color:var(--cap); }
.xrow { display:none; }
.xrow.on { display:table-row; }
.xi { background:var(--w); border-radius:6px; padding:8px 12px; margin:3px 0; }
.xi table { font-size:11px; }
.xi th { font-size:10px; padding:4px 10px 4px 0; }
.xi td { padding:4px 10px 4px 0; border-bottom:1px solid var(--bl); }

/* cat group header */
tr.gh td { background:var(--bl); padding:8px 0 4px; font-size:10px; font-weight:600;
            color:var(--bd); text-transform:uppercase; letter-spacing:.6px;
            border-bottom:1px solid var(--g); }
</style>
</head>
<body>

<!-- password overlay -->
<div id="pw-overlay">
  <img src="logo.png" alt="hypnos">
  <div id="pw-form">
    <input id="pw-input" type="password" placeholder="contraseña" autocomplete="off">
    <button id="pw-btn" onclick="checkPw()">entrar</button>
    <span id="pw-err"></span>
  </div>
</div>

<div class="hdr">
  <div class="wrap">
    <img src="logo.png" alt="hypnos" class="logo-img">
    <span class="sub">operaciones · stock</span>
    <div class="hdr-r">
      <span id="hdr-sync"></span>
      <span id="hdr-fecha"></span>
      <button class="btn" onclick="fetchData()">↺ actualizar</button>
    </div>
  </div>
</div>

<div class="nav">
  <div class="wrap" style="padding-top:16px;padding-bottom:0">
  <div class="tabs">
    <button class="tab on" data-tab="general">stock actual</button>
    <button class="tab" data-tab="quiebres">quiebres</button>
    <button class="tab" data-tab="cambios">cambios vs ayer</button>
    <button class="tab" data-tab="movimientos">movimientos</button>
  </div>
  </div>
</div>

<div class="cnt">
<div class="wrap" style="padding-top:16px">

  <div class="panel on" id="panel-general">
    <div class="tb">
      <input class="si" id="q-general" placeholder="buscar SKU o producto…">
      <label style="font-size:11px;color:var(--bd)">resaltar stock ≤
        <input type="number" id="low-th" value="10" min="0" class="si" style="width:60px;flex:none">
      </label>
      <input type="datetime-local" class="si" id="snap-dt" style="width:190px;flex:none">
      <button class="pb" id="snap-go">ver stock a esa fecha/hora</button>
      <button class="pb" id="snap-now" style="display:none">← stock actual</button>
      <span class="rc" id="snap-note" style="color:#b45309"></span>
      <button class="pb" id="hidden-toggle">ocultos (0)</button>
      <span class="rc" id="rc-general"></span>
    </div>
    <div id="hidden-panel" style="display:none;margin:-2px 0 10px"></div>
    <div class="tw">
      <div class="st" id="msg-general"><span class="sp"></span>cargando...</div>
      <table id="tbl-general" style="display:none">
        <thead><tr>
          <th style="width:110px">Categoría</th>
          <th style="width:90px">SKU</th>
          <th>Producto</th>
          <th class="r" style="width:70px">Stock</th>
          <th style="width:110px"></th>
        </tr></thead>
        <tbody id="tb-general"></tbody>
      </table>
    </div>
  </div>

  <div class="panel" id="panel-quiebres">
    <div class="tb">
      <input class="si" id="q-quiebres" placeholder="buscar…">
      <span class="rc" id="rc-quiebres"></span>
    </div>
    <div class="tw">
      <div class="st" id="msg-quiebres"><span class="sp"></span>cargando...</div>
      <table id="tbl-quiebres" style="display:none">
        <thead><tr>
          <th style="width:110px">Categoría</th>
          <th style="width:90px">SKU</th>
          <th>Producto</th>
          <th style="width:110px">Quiebre</th>
          <th class="r" style="width:70px">Antes</th>
          <th class="r" style="width:70px">Ahora</th>
        </tr></thead>
        <tbody id="tb-quiebres"></tbody>
      </table>
    </div>
  </div>

  <div class="panel" id="panel-cambios">
    <div class="tb">
      <input type="date" class="si" id="cmp-from" style="width:150px;flex:none">
      <span style="color:var(--bd)">→</span>
      <input type="date" class="si" id="cmp-to" style="width:150px;flex:none">
      <button class="pb" id="cmp-go">comparar</button>
      <button class="pb" id="cmp-reset">ayer vs hoy</button>
      <input class="si" id="q-cambios" placeholder="buscar…">
      <span class="rc" id="rc-cambios"></span>
    </div>
    <div class="tw">
      <div class="st" id="msg-cambios"><span class="sp"></span>cargando...</div>
      <table id="tbl-cambios" style="display:none">
        <thead><tr>
          <th style="width:110px">Categoría</th>
          <th style="width:90px">SKU</th>
          <th>Producto</th>
          <th class="r" id="th-cambios-ayer" style="width:90px">Ayer</th>
          <th class="r" id="th-cambios-hoy" style="width:90px">Hoy</th>
          <th class="r" style="width:80px">Cambio</th>
        </tr></thead>
        <tbody id="tb-cambios"></tbody>
      </table>
    </div>
  </div>

  <div class="panel" id="panel-movimientos">
    <div class="tb">
      <div class="pp" id="pp">
        <button class="pb" data-d="7">7d</button>
        <button class="pb on" data-d="30">30d</button>
        <button class="pb" data-d="60">60d</button>
        <button class="pb" data-d="90">90d</button>
        <button class="pb" data-d="365">365d</button>
        <button class="pb" data-d="0">histórico</button>
      </div>
      <input class="si" id="q-movimientos" placeholder="buscar SKU, producto, razón u order_id…">
      <select class="si" id="f-tipo" style="width:auto;flex:none">
        <option value="">tipo: todos</option>
        <option value="entrada">entrada</option>
        <option value="salida">salida</option>
      </select>
      <select class="si" id="f-reason" style="width:auto;flex:none">
        <option value="">razón: todas</option>
      </select>
      <button class="pb" id="mov-csv">⬇ CSV</button>
      <span class="rc" id="rc-movimientos"></span>
      <span class="rc" id="cap-movimientos" style="color:var(--bd)"></span>
      <button class="pb" id="mov-reload" style="margin-left:auto">↻ traer nuevos de Starkoms</button>
    </div>
    <div class="tw">
      <div class="st" id="msg-movimientos"><span class="sp"></span>cargando...</div>
      <table id="tbl-movimientos" style="display:none">
        <thead><tr>
          <th style="width:90px">Fecha</th>
          <th style="width:70px">Hora</th>
          <th style="width:90px">SKU</th>
          <th>Producto</th>
          <th style="width:70px">Tipo</th>
          <th style="width:80px">Razón</th>
          <th class="r" style="width:75px">Cantidad</th>
          <th class="r" style="width:75px">Balance</th>
        </tr></thead>
        <tbody id="tb-movimientos"></tbody>
      </table>
    </div>
  </div>

</div>
</div>

<script>
// ── auth ──────────────────────────────────────────────────────
const PW = 'HypnosOp2026';
const ov = document.getElementById('pw-overlay');
const pi = document.getElementById('pw-input');

function checkPw() {
  if (pi.value === PW) {
    sessionStorage.setItem('hx_auth', '1');
    ov.style.display = 'none';
  } else {
    document.getElementById('pw-err').textContent = 'clave incorrecta';
    pi.value = '';
    pi.focus();
    setTimeout(() => document.getElementById('pw-err').textContent = '', 2000);
  }
}
pi.addEventListener('keydown', e => { if (e.key === 'Enter') checkPw(); });

if (sessionStorage.getItem('hx_auth') === '1') {
  ov.style.display = 'none';
} else {
  setTimeout(() => pi.focus(), 100);
}

// ── dashboard ─────────────────────────────────────────────────
const GAS = 'https://script.google.com/macros/s/AKfycbyojJOn7UFlayuTDduZVYI0CpDVMshFislXnFzlrVvjx-2QXdwI7Us5pPkgiBZpKGrh/exec';
let D = null, Dmov = null, Dcmp = null, days = 30;
let lowTh = 10, movTipo = '', movReason = '', _movRows = [];
let snapAt = null, Dsnap = null;

const esc = s => String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const $ = id => document.getElementById(id);

function setMsg(id, html) {
  $('msg-'+id).innerHTML = html; $('msg-'+id).style.display='';
  const t=$('tbl-'+id); if(t) t.style.display='none';
}
function showTbl(id) {
  $('msg-'+id).style.display='none'; $('tbl-'+id).style.display='';
}
function setRc(id, n, tot) {
  $('rc-'+id).textContent = n===tot ? `${tot}` : `${n} / ${tot}`;
}
function reasonBadge(r) {
  return r==='pedido'?'b-ped': r==='autosync'?'b-syn':'b-adj';
}

// tabs
document.querySelectorAll('.tab').forEach(b => b.addEventListener('click', () => {
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
  document.querySelectorAll('.panel').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');
  $('panel-'+b.dataset.tab).classList.add('on');
  if (b.dataset.tab === 'movimientos') {
    fetchMov();
  } else if (D) {
    render(b.dataset.tab, $('q-'+b.dataset.tab)?.value||'');
  }
}));

// search
['general','quiebres','cambios','movimientos'].forEach(id => {
  $('q-'+id)?.addEventListener('input', e => {
    if (id === 'movimientos') { if (Dmov) renderMov(e.target.value); }
    else if (D) render(id, e.target.value);
  });
});

// period (solo los pills del tab movimientos)
document.querySelectorAll('#pp .pb').forEach(b => b.addEventListener('click', () => {
  document.querySelectorAll('#pp .pb').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');
  days = parseInt(b.dataset.d);
  Dmov = null; // reset movimientos cache on period change
  fetchData();
  // si el tab movimientos está activo, recargar de inmediato (no esperar re-apertura)
  if (document.querySelector('.tab.on')?.dataset?.tab === 'movimientos') fetchMov();
}));

// última actualización (LAST_SYNC → hora Santiago)
function fmtSync(iso){
  if(!iso) return '';
  try{
    const d=new Date(iso);
    return 'última sync: '+d.toLocaleString('es-CL',{timeZone:'America/Santiago',day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
  }catch(e){ return ''; }
}

// traer movimientos nuevos desde Starkoms (corre syncMovimientos en el GAS)
function syncStarkoms(){
  const btn=$('mov-reload');
  if(btn){ btn.disabled=true; btn.textContent='sincronizando…'; }
  setMsg('movimientos','<span class="sp"></span>trayendo movimientos nuevos de Starkoms… puede tardar 1–2 min, no cierres la pestaña');
  fetch(`${GAS}?action=sync`)
    .then(r=>r.json())
    .then(data=>{
      if(!data.ok){ setMsg('movimientos', data.error||'error al sincronizar'); return; }
      if(data.lastSync) updateSync(data.lastSync);
      Dmov=null; Dcmp=null;
      fetchData();   // refresca stock / quiebres / cambios
      fetchMov();    // recarga movimientos del período actual
    })
    .catch(()=> setMsg('movimientos','error al sincronizar con Starkoms (revisa conexión / vuelve a intentar)'))
    .finally(()=>{ if(btn){ btn.disabled=false; btn.textContent='↻ traer nuevos de Starkoms'; } });
}
$('mov-reload')?.addEventListener('click', syncStarkoms);

// filtros stock bajo / tipo / razón + export CSV
function populateReasonFilter(){
  const sel=$('f-reason'); if(!sel) return;
  const cur=sel.value;
  const reasons=[...new Set(Dmov.map(r=>r.reason).filter(Boolean))].sort();
  sel.innerHTML='<option value="">razón: todas</option>'+reasons.map(x=>`<option value="${esc(x)}">${esc(x)}</option>`).join('');
  sel.value = reasons.includes(cur)?cur:'';
  movReason = sel.value;
}
function exportCsv(filename, header, rows){
  const q = v => { v = v==null?'':String(v); return /[",\n;]/.test(v) ? '"'+v.replace(/"/g,'""')+'"' : v; };
  const csv = [header.join(',')].concat(rows.map(r=>r.map(q).join(','))).join('\r\n');
  const blob = new Blob(['﻿'+csv], {type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download=filename; document.body.appendChild(a); a.click();
  a.remove(); URL.revokeObjectURL(a.href);
}
function updateSync(iso){
  const h=$('hdr-sync'); if(!h) return;
  h.textContent=fmtSync(iso); h.style.color=''; h.title='';
  if(iso){ const ageH=(Date.now()-new Date(iso).getTime())/3600000;
    if(ageH>48){ h.style.color='#f87171'; h.title='sin sincronizar hace más de 2 días'; }
    else if(ageH>28){ h.style.color='#fbbf24'; h.title='sincronización diaria atrasada'; }
  }
}
$('low-th')?.addEventListener('input', e=>{ lowTh=parseInt(e.target.value,10)||0; if(D) render('general',$('q-general')?.value||''); });
$('f-tipo')?.addEventListener('change', e=>{ movTipo=e.target.value; if(Dmov) renderMov($('q-movimientos')?.value||''); });
$('f-reason')?.addEventListener('change', e=>{ movReason=e.target.value; if(Dmov) renderMov($('q-movimientos')?.value||''); });
$('mov-csv')?.addEventListener('click', ()=>{
  if(!_movRows.length) return;
  exportCsv('movimientos.csv',
    ['fecha','hora','sku','producto','tipo','razon','cantidad','balance','order_id'],
    _movRows.map(r=>[r.fecha,r.hora,r.sku,r.name,r.tipo,r.reason,r.cantidad,r.balance,r.order_id]));
});

// ── ocultar SKUs / categorías (persistente en el navegador) ──
function _lsGet(k){ try{ return JSON.parse(localStorage.getItem(k)||'[]'); }catch(e){ return []; } }
let hiddenSkus = new Set(_lsGet('hx_hidden_skus'));
let hiddenCats = new Set(_lsGet('hx_hidden_cats'));
let _skuCat = {};
const jsq = s => String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'");
function saveHidden(){ try{ localStorage.setItem('hx_hidden_skus', JSON.stringify([...hiddenSkus])); localStorage.setItem('hx_hidden_cats', JSON.stringify([...hiddenCats])); }catch(e){} }
function catOf(sku){ return _skuCat[sku]||''; }
function isHidden(sku,cat){ return hiddenSkus.has(sku) || (!!cat && hiddenCats.has(cat)); }
function hideSku(sku){ hiddenSkus.add(sku); saveHidden(); rerenderAll(); }
function hideCat(cat){ hiddenCats.add(cat); saveHidden(); rerenderAll(); }
function unhideSku(sku){ hiddenSkus.delete(sku); saveHidden(); rerenderAll(); }
function unhideCat(cat){ hiddenCats.delete(cat); saveHidden(); rerenderAll(); }
function rerenderAll(){
  renderHiddenPanel();
  if(D){ render('general',$('q-general')?.value||''); render('quiebres',$('q-quiebres')?.value||''); render('cambios',$('q-cambios')?.value||''); }
  if(Dmov) renderMov($('q-movimientos')?.value||'');
}
function renderHiddenPanel(){
  const n=hiddenSkus.size+hiddenCats.size;
  const btn=$('hidden-toggle'); if(btn) btn.textContent=`ocultos (${n})`;
  const p=$('hidden-panel'); if(!p) return;
  if(!n){ p.innerHTML='<span style="font-size:11px;color:var(--bd)">no hay SKUs ni categorías ocultas</span>'; return; }
  const chip=(txt,fn)=>`<span style="display:inline-flex;align-items:center;gap:6px;border:1px solid var(--g);border-radius:6px;padding:2px 8px;margin:0 6px 6px 0;font-size:11px">${esc(txt)} <button class="xbtn" style="color:#b91c1c" onclick="${fn}">✕</button></span>`;
  p.innerHTML = [...hiddenCats].map(c=>chip('categoría: '+c, `unhideCat('${jsq(c)}')`)).join('')
              + [...hiddenSkus].map(s=>chip(s, `unhideSku('${jsq(s)}')`)).join('');
}
$('hidden-toggle')?.addEventListener('click', ()=>{ const p=$('hidden-panel'); if(!p) return; const show=p.style.display==='none'; p.style.display=show?'':'none'; if(show) renderHiddenPanel(); });
renderHiddenPanel();

// ── ver stock a una fecha/hora específica (todos los SKU de la maestra) ──
(function(){ const el=$('snap-dt'); if(el&&!el.value){ const d=new Date(), p=n=>String(n).padStart(2,'0');
  el.value=`${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`; } })();
$('snap-go')?.addEventListener('click', ()=>{
  const v=$('snap-dt')?.value; if(!v) return;
  setMsg('general', `<span class="sp"></span>calculando stock al ${v.replace('T',' ')}…`);
  fetch(`${GAS}?snapAt=${encodeURIComponent(v)}`)
    .then(r=>r.json())
    .then(data=>{
      Dsnap = data.snapshot || []; snapAt = data.at || v;
      const n=$('snap-note'); if(n) n.textContent = 'stock al '+(data.at||v);
      const b=$('snap-now'); if(b) b.style.display='';
      render('general', $('q-general')?.value||'');
    })
    .catch(()=> setMsg('general','error al calcular el stock a esa fecha/hora'));
});
$('snap-now')?.addEventListener('click', ()=>{
  snapAt=null; Dsnap=null;
  const n=$('snap-note'); if(n) n.textContent='';
  const b=$('snap-now'); if(b) b.style.display='none';
  if(D) render('general', $('q-general')?.value||'');
});

// comparar balance entre 2 fechas (tab cambios)
function _dStr(ms){ const d=new Date(ms); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
(function(){ const f=$('cmp-from'), t=$('cmp-to');
  if(f&&!f.value) f.value=_dStr(Date.now()-86400000);
  if(t&&!t.value) t.value=_dStr(Date.now());
})();
$('cmp-go')?.addEventListener('click', () => {
  const from=$('cmp-from').value, to=$('cmp-to').value;
  if(!from||!to){ setMsg('cambios','elige ambas fechas'); return; }
  if(from>to){ setMsg('cambios','la fecha inicial debe ser anterior o igual a la final'); return; }
  setMsg('cambios', `<span class="sp"></span>comparando ${from} → ${to}...`);
  fetch(`${GAS}?cmpFrom=${from}&cmpTo=${to}`)
    .then(r=>r.json())
    .then(data => { Dcmp = data; render('cambios', $('q-cambios')?.value||''); })
    .catch(()=> setMsg('cambios','error al comparar'));
});
$('cmp-reset')?.addEventListener('click', () => {
  Dcmp = null;
  $('cmp-from').value=_dStr(Date.now()-86400000);
  $('cmp-to').value=_dStr(Date.now());
  if(D) render('cambios', $('q-cambios')?.value||'');
});

// expand
function toggleX(sku) {
  const row = $('xr-'+sku); if(!row) return;
  const open = row.classList.toggle('on');
  $('xb-'+sku).textContent = open ? '▲ ocultar' : '▼ ver movimientos';
}
function toggleXC(sku) {
  const row = $('xr-c-'+sku); if(!row) return;
  const open = row.classList.toggle('on');
  const b = $('xb-c-'+sku); if(b) b.textContent = open ? '▲' : '▼';
}

// fetch principal (snapshot, quiebres, cambios, movBySku)
function fetchData() {
  ['general','quiebres','cambios'].forEach(id =>
    setMsg(id, '<span class="sp"></span>cargando...'));
  setMsg('movimientos', 'abre este tab para cargar movimientos');
  fetch(`${GAS}?days=${days}`)
    .then(r=>r.json())
    .then(data => {
      D = data; Dmov = null;
      $('hdr-fecha').textContent = data.fecha || '';
      updateSync(data.lastSync);
      _skuCat = {}; (data.snapshot||[]).forEach(s => { _skuCat[s.sku] = s.cat; });
      renderHiddenPanel();
      // solo renderizar tabs activos (no movimientos)
      const activeTab = document.querySelector('.tab.on')?.dataset?.tab;
      if (!activeTab || activeTab !== 'movimientos') {
        ['general','quiebres','cambios'].forEach(t => render(t, $('q-'+t)?.value||''));
      }
    })
    .catch(() => ['general','quiebres','cambios'].forEach(id =>
      setMsg(id, 'error al cargar datos')));
}

// fetch movimientos (lazy, solo cuando el usuario abre el tab)
function fetchMov() {
  if (Dmov) { renderMov($('q-movimientos')?.value||''); return; }
  setMsg('movimientos', '<span class="sp"></span>cargando movimientos...');
  fetch(`${GAS}?days=${days}&tab=mov`)
    .then(r=>r.json())
    .then(data => {
      Dmov = data.movimientos || [];
      populateReasonFilter();
      renderMov($('q-movimientos')?.value||'');
    })
    .catch(() => setMsg('movimientos', 'error al cargar movimientos'));
}

function renderMov(q) {
  q = (q||'').toLowerCase().trim();
  const rows = Dmov.filter(r => {
    if (isHidden(r.sku, catOf(r.sku))) return false;
    if (movTipo && r.tipo !== movTipo) return false;
    if (movReason && r.reason !== movReason) return false;
    if (!q) return true;
    return r.sku.toLowerCase().includes(q) || (r.name||'').toLowerCase().includes(q) ||
      r.tipo.toLowerCase().includes(q) || (r.reason||'').toLowerCase().includes(q) ||
      String(r.order_id||'').toLowerCase().includes(q);
  });
  _movRows = rows; // para exportar CSV
  setRc('movimientos', rows.length, Dmov.length);
  { const cn=$('cap-movimientos'); if(cn) cn.textContent=''; }
  if (!rows.length) { setMsg('movimientos', q?'sin resultados':'sin movimientos en el período'); return; }
  showTbl('movimientos');
  const CAP = 3000;
  const capped = rows.length > CAP;
  const view = capped ? rows.slice(0, CAP) : rows;
  const capNote = $('cap-movimientos');
  if (capNote) capNote.textContent = capped
    ? `mostrando ${CAP} de ${rows.length} — afina la búsqueda para ver el resto`
    : '';
  $('tb-movimientos').innerHTML = view.map(r => {
    const cls = r.cantidad<0?'neg':'pos';
    return `<tr class="dr">
      <td style="font-variant-numeric:tabular-nums">${esc(r.fecha)}</td>
      <td style="font-variant-numeric:tabular-nums;color:var(--bd)">${esc(r.hora)}</td>
      <td class="sku">${esc(r.sku)}</td>
      <td>${esc(r.name)}</td>
      <td><span class="bx ${r.tipo==='entrada'?'b-in':'b-out'}">${esc(r.tipo)}</span></td>
      <td><span class="bx ${reasonBadge(r.reason)}">${esc(r.reason)}</span></td>
      <td class="r ${cls}">${r.cantidad>0?'+'+r.cantidad:r.cantidad}</td>
      <td class="r" style="font-weight:500">${r.balance}</td>
    </tr>`;
  }).join('');
}

// render
function render(tab, q) {
  q = (q||'').toLowerCase().trim();

  if (tab === 'general') {
    const srcSnap = (snapAt && Dsnap) ? Dsnap : (D.snapshot || []);
    const rows = srcSnap.filter(r =>
      (!q || r.sku.toLowerCase().includes(q) || r.name.toLowerCase().includes(q) ||
      (r.cat||'').toLowerCase().includes(q)) && !isHidden(r.sku, r.cat));
    setRc('general', rows.length, srcSnap.length);
    if (!rows.length) { setMsg('general', q?'sin resultados':'sin datos'); return; }
    showTbl('general');
    let lastCat = null;
    $('tb-general').innerHTML = rows.map(r => {
      const catRow = r.cat !== lastCat
        ? `<tr class="gh"><td colspan="5" style="padding-left:0">${esc(lastCat=r.cat)||'sin categoría'}<button class="xbtn" title="ocultar categoría" onclick="hideCat('${jsq(r.cat)}')" style="margin-left:8px;font-size:10px">ocultar categoría</button></td></tr>` : '';
      const movs = D.movBySku?.[r.sku] || [];
      const inner = movs.length
        ? `<table><thead><tr><th>Fecha</th><th>Hora</th><th>Tipo</th><th>Razón</th><th class="r">Cant.</th><th class="r">Balance</th></tr></thead><tbody>`
          + movs.map(m=>`<tr>
              <td>${esc(m.fecha)}</td><td>${esc(m.hora)}</td>
              <td><span class="bx ${m.tipo==='entrada'?'b-in':'b-out'}">${esc(m.tipo)}</span></td>
              <td><span class="bx ${reasonBadge(m.reason)}">${esc(m.reason)}</span></td>
              <td class="r ${m.cantidad<0?'neg':'pos'}">${m.cantidad>0?'+'+m.cantidad:m.cantidad}</td>
              <td class="r">${m.balance}</td></tr>`).join('')
          + `</tbody></table>`
        : `<span style="color:var(--bd);font-size:11px">sin movimientos en el período</span>`;

      const stStyle = r.sinMov ? ';color:var(--bd)' : (r.stock<=0 ? ';color:#b91c1c' : (r.stock<=lowTh ? ';color:#b45309' : ''));
      return catRow + `<tr class="dr">
        <td class="cat">${esc(r.subcat||r.cat||'')}</td>
        <td class="sku">${esc(r.sku)}</td>
        <td>${esc(r.name)}</td>
        <td class="r" style="font-weight:500${stStyle}">${r.stock}</td>
        <td>
          <button class="xbtn" id="xb-${esc(r.sku)}" onclick="toggleX('${esc(r.sku)}')">▼ ver movimientos</button>
          <button class="xbtn" title="ocultar SKU" onclick="event.stopPropagation();hideSku('${jsq(r.sku)}')" style="color:#b91c1c;margin-left:8px">✕</button>
        </td>
      </tr>
      <tr class="xrow" id="xr-${esc(r.sku)}">
        <td colspan="5"><div class="xi">${inner}</div></td>
      </tr>`;
    }).join('');
    return;
  }

  if (tab === 'quiebres') {
    const rows = D.quiebres.filter(r =>
      (!q || r.sku.toLowerCase().includes(q) || r.name.toLowerCase().includes(q)) && !isHidden(r.sku, r.cat));
    setRc('quiebres', rows.length, D.quiebres.length);
    if (!rows.length) { setMsg('quiebres', q?'sin resultados':'sin quiebres'); return; }
    showTbl('quiebres');
    $('tb-quiebres').innerHTML = rows.map(r => `<tr class="dr">
      <td class="cat">${esc(r.subcat||r.cat||'')}</td>
      <td class="sku">${esc(r.sku)}</td>
      <td>${esc(r.name)}</td>
      <td style="font-size:12px;color:var(--bd)">${esc(r.fechaQuiebre||'—')}</td>
      <td class="r" style="color:var(--bd)">${r.stockAntesQuiebre??'—'}</td>
      <td class="r"><span class="bx b-sin">0</span></td>
    </tr>`).join('');
    return;
  }

  if (tab === 'cambios') {
    const src = Dcmp || D;
    const list = src.cambios || [];
    const rows = list.filter(r =>
      (!q || r.sku.toLowerCase().includes(q) || r.name.toLowerCase().includes(q)) && !isHidden(r.sku, r.cat));
    setRc('cambios', rows.length, list.length);
    const _sub = d => `<span style="font-weight:400;font-size:10px;color:var(--bd)">${esc(d||'')}</span>`;
    const _thA = $('th-cambios-ayer'), _thH = $('th-cambios-hoy');
    if (_thA) _thA.innerHTML = 'Antes<br>' + _sub(src.fechaAnterior);
    if (_thH) _thH.innerHTML = 'Después<br>' + _sub(src.fecha);
    if (!rows.length) { setMsg('cambios', q?'sin resultados':`sin cambios entre ${src.fechaAnterior||'ayer'} y ${src.fecha||'hoy'}`); return; }
    showTbl('cambios');
    $('tb-cambios').innerHTML = rows.map(r => {
      const cls = r.diff>0?'pos':'neg';
      const movs = (D && D.movBySku && D.movBySku[r.sku]) || [];
      const inner = movs.length
        ? `<table><thead><tr><th>Fecha</th><th>Hora</th><th>Tipo</th><th>Razón</th><th class="r">Cant.</th><th class="r">Balance</th></tr></thead><tbody>`
          + movs.map(m=>`<tr>
              <td>${esc(m.fecha)}</td><td>${esc(m.hora)}</td>
              <td><span class="bx ${m.tipo==='entrada'?'b-in':'b-out'}">${esc(m.tipo)}</span></td>
              <td><span class="bx ${reasonBadge(m.reason)}">${esc(m.reason)}</span></td>
              <td class="r ${m.cantidad<0?'neg':'pos'}">${m.cantidad>0?'+'+m.cantidad:m.cantidad}</td>
              <td class="r">${m.balance}</td></tr>`).join('')
          + `</tbody></table>`
        : `<span style="color:var(--bd);font-size:11px">sin movimientos en el período cargado (cambia el período en la pestaña movimientos)</span>`;
      return `<tr class="dr" style="cursor:pointer" onclick="toggleXC('${esc(r.sku)}')">
        <td class="cat">${esc(r.subcat||r.cat||'')}</td>
        <td class="sku">${esc(r.sku)}</td>
        <td><span class="xbtn" id="xb-c-${esc(r.sku)}">▼</span> ${esc(r.name)}</td>
        <td class="r" style="color:var(--bd)">${r.prev}</td>
        <td class="r" style="font-weight:500">${r.stock}</td>
        <td class="r ${cls}">${r.diff>0?'+':''}${r.diff}</td>
      </tr>
      <tr class="xrow" id="xr-c-${esc(r.sku)}"><td colspan="6"><div class="xi">${inner}</div></td></tr>`;
    }).join('');
    return;
  }

  if (tab === 'movimientos') {
    fetchMov();
  }
}

fetchData();
</script>
</body>
</html>
